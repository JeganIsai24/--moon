<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Birthday Celebration</title>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">  
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="main">
            <div class="container">
                <div class="card">
                    <div class="imgBox">
                        <img src="Ja1.png" alt="Oye greeting" />
                        <img src="1.jpg" alt="Oye image back" />
                    </div>
                    <div class="details">
                        <div class="content">
                            <h2>Oye!<br><span></span></h2>
                            <div class="social-icons">
                                <a href="#" title="Moon"><i class="fa fa-moon-o" aria-hidden="true"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="imgBox">
                        <img src="ja2.png" alt="Birthday greeting" />
                        <img src="2.jpg" alt="Birthday image back" />
                    </div>
                    <div class="details">
                        <div class="content">
                            <h2>It's your <br><span>Birthday</span></h2>
                            <div class="social-icons">
                                <a href="#" title="Birthday"><i class="fa fa-birthday-cake" aria-hidden="true"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="imgBox">
                        <img src="ja3.png" alt="Something different" />
                        <img src="3.jpg" alt="Something different image back" />
                    </div>
                    <div class="details">
                        <div class="content">
                            <h2>Wanted to do<br><span>Something different</span></h2>
                            <div class="social-icons">
                                <a href="#" title="Magic"><i class="fa fa-magic" aria-hidden="true"></i></a>   
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="imgBox">
                        <img src="ja4.png" alt="You are special" />
                        <img src="4.jpeg" alt="You are special image back" />
                    </div>
                    <div class="details">
                        <div class="content">
                            <h2>B'coz you are<br><span>always special!</span></h2>
                            <div class="social-icons">
                                <a href="#" title="Love"><i class="fa fa-heart" aria-hidden="true"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="container">
                <div class="card">
                    <div class="imgBox">
                        <img src="ja5.png" alt="Happy birthday" />
                        <img src="5.jpg" alt="Happy birthday image back" />
                    </div>
                    <div class="details">
                        <div class="content">
                            <h2>So <br><span>Happy birthday :)</span></h2>
                            <div class="social-icons">
                                <a href="#" title="Code"><i class="fa fa-free-code-camp" aria-hidden="true"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="imgBox">
                        <img src="ja6.png" alt="Come back" />
                        <img src="6.jpg" alt="Come back image back" />
                    </div>
                    <div class="details">
                        <div class="content">
                            <h2>Now <br><span>come back</span></h2>
                            <div class="social-icons">
                                <a href="#" title="Back"><i class="fa fa-backward" aria-hidden="true"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="imgBox">
                        <img src="ja7.png" alt="Tell me" />
                        <img src="7.jpg" alt="Tell me image back" />
                    </div>
                    <div class="details">
                        <div class="content">
                            <h2>and <br><span>tell me</span></h2>
                            <div class="social-icons">
                                <a href="#" title="Message"><i class="fa fa-mobile" aria-hidden="true"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="imgBox">
                        <img src="Ja8.png" alt="Did you like it" />
                        <img src="8.jpg" alt="Did you like it image back" />
                    </div>
                    <div class="details">
                        <div class="content">
                            <h2>if you<br><span>liked it😉</span></h2>
                            <div class="social-icons">
                                <a href="#" title="Like"><i class="fa fa-thumbs-up" aria-hidden="true"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
